<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * {margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
    body {background:#0b0f19;color:#fff;}header {
  display:flex;justify-content:space-between;align-items:center;
  padding:20px 80px;
}

header h2 {font-weight:600;}

nav a {
  margin-left:25px;text-decoration:none;color:#aaa;transition:0.3s;
}

nav a:hover {color:#fff;}

.hero {
  display:flex;justify-content:space-between;align-items:center;
  padding:100px 80px;
}

.hero-text h1 {
  font-size:48px;margin-bottom:20px;
}

.hero-text span {color:#4f46e5;}

.hero-text p {color:#aaa;margin-bottom:20px;}

.btn {
  padding:12px 25px;background:#4f46e5;border:none;border-radius:8px;
  color:white;cursor:pointer;
}

.hero img {
  width:300px;border-radius:20px;
}

.section {padding:80px;}

.section h2 {margin-bottom:40px;font-size:32px;}

.skills {
  display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:20px;
}

.skill {
  background:#111827;padding:20px;text-align:center;border-radius:10px;
}

.projects {
  display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card {
  background:#111827;padding:20px;border-radius:12px;
  transition:0.3s;
}

.card:hover {transform:translateY(-5px);}

footer {
  text-align:center;padding:30px;color:#777;
}

@media(max-width:768px){
  .hero {flex-direction:column;text-align:center;}
  .hero img {margin-top:30px;}
  header {padding:20px;}
  .section {padding:40px;}
}

  </style>
</head>
<body><header>
  <h2>Ali.dev</h2>
  <nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Projects</a>
    <a href="#">Contact</a>
  </nav>
</header><section class="hero">
  <div class="hero-text">
    <h1>Hello, I'm <span>Ali</span></h1>
    <p>Frontend Developer passionate about building modern websites.</p>
    <button class="btn">Hire Me</button>
  </div>
  <img src="https://via.placeholder.com/300" alt="profile">
</section><section class="section">
  <h2>Skills</h2>
  <div class="skills">
    <div class="skill">HTML</div>
    <div class="skill">CSS</div>
    <div class="skill">JavaScript</div>
    <div class="skill">React</div>
  </div>
</section><section class="section">
  <h2>Projects</h2>
  <div class="projects">
    <div class="card">Project One</div>
    <div class="card">Project Two</div>
    <div class="card">Project Three</div>
  </div>
</section><footer>
  <p>© 2026 Ali - All rights reserved</p>
</footer></body>
</html>
